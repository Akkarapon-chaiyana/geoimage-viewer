async function deriveKey(p,s){
  const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function unlock(){
  const pwd=document.getElementById('pwd').value;
  const msg=document.getElementById('msg');
  const loading=document.getElementById('loading');
  if(!pwd){msg.textContent='Please enter a password.';return;}
  msg.textContent='';loading.style.display='block';
  try{
    const buf=Uint8Array.from(atob(D),c=>c.charCodeAt(0));
    const key=await deriveKey(pwd,buf.slice(0,16));
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(16,28)},key,buf.slice(28));
    const html=new TextDecoder().decode(plain);
    const blob=new Blob([html],{type:'text/html'});
    location.href=URL.createObjectURL(blob);
  }catch(e){
    loading.style.display='none';
    msg.textContent='Incorrect password. Please try again.';
  }
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
